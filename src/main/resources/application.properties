spring.application.name=zenith-backend

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/zenith
spring.datasource.username=zenith
spring.datasource.password=zenith
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yml

# AWS Cognito / OAuth2 Resource Server
# Replace <region> and <user-pool-id> with your actual Cognito values
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.<region>.amazonaws.com/<user-pool-id>
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://cognito-idp.<region>.amazonaws.com/<user-pool-id>/.well-known/jwks.json

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha

# Logging
logging.level.dev.zenith=DEBUG
logging.level.org.springframework.security=INFO
